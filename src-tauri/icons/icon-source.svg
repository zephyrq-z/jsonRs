    <path d="M340 260C240 260 180 320 180 420v184c0 100-60 160-60 160 60 0 60 60 60 160v184c0 100 60 160 160 160" />
    <path d="M684 260C784 260 844 320 844 420v184c0 100 60 160 60 160-60 0-60 60-60 160v184c0 100-60 160-160 160" />
